spring:
  # test db config h2
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
        # create the testdb database in memory;database stays alive until the tests are over
    driverClassName: org.h2.Driver
    username: sa
    password: 

  jpa:
    hibernate:
      # hibernate creates the db
      ddl-auto: create-drop # hibernate creates the tables based on the models
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect #hibernates create sql in h2 language

  # deactivate spring ai for testing
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration
      - org.springframework.ai.ollama.autoconfigure.OllamaAutoConfiguration
