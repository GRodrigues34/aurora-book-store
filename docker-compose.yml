services:
  mysql:
    image: mysql:8.0
    container_name: aurora_mysql
    environment:
      MYSQL_DATABASE: aurora_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: aurora_chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aurora_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  mysql_data:
  chroma_data:
  ollama_data:
